apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-two
  namespace: kube-system
spec:
  replicas: 3          # ← 3 replicas as required
  selector:
    matchLabels:
      app: app-two
  template:
    metadata:
      labels:
        app: app-two
    spec:
      containers:
      - name: app-two
        image: nginxdemos/hello
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app-two
  namespace: kube-system
spec:
  selector:
    app: app-two
  ports:
  - port: 80
    targetPort: 80